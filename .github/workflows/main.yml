on:
  push:
    branches:
      - main
      - develop
      - 'release-*'
  pull_request:
    branches:
      - main
      - develop
      - 'release-*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create .env file for Docker
      run: |
        echo "POSTGRES_USER=postgres" >> .env
        echo "POSTGRES_PASSWORD=password123" >> .env
        echo "USER_DB=user_db" >> .env
        echo "LISTING_DB=listing_db" >> .env
        echo "AUCTION_DB=auction_db" >> .env
        echo "TRANSACTION_DB=transaction_db" >> .env
        echo "REPORT_DB=report_db" >> .env
        echo "REVIEW_DB=review_db" >> .env
        echo "PRICING_DB=pricing_db" >> .env
        echo "JWT_SECRET_KEY=test_secret" >> .env

    - name: Start Microservices
      run: docker compose up -d --build

    - name: Init DB
      run: |
        services=("user_service" "listing_service" "auction_service" "transaction_service" "review_service" "report_service")
        for s in "${services[@]}"; do
          docker exec $s python3 -c "from app import create_app, db; app=create_app(); app.app_context().push(); db.create_all()" || true
        done

    - name: Wait for API Gateway
      run: |
        timeout 60s bash -c 'until curl -f http://localhost/health; do sleep 5; done'

    - name: Run Postman Tests
      run: |
        npm install -g newman
        newman run "automation-tests/postman/EV_Platform_Automation.postman_collection.json" \
          -e "automation-tests/postman/EV_Testing.postman_environment.json" \
          --env-var "url_base=http://localhost/" \
          --bail