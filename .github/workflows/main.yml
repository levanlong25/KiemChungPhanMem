name: EV Platform CI/CD

on:
  pull_request:
    branches: [ "main", "release-1" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 1: Tạo file .env để các database không bị lỗi khởi động
    - name: Create .env file
      run: |
        echo "POSTGRES_USER=postgres" >> .env
        echo "POSTGRES_PASSWORD=password123" >> .env
        echo "USER_DB=user_db" >> .env
        echo "LISTING_DB=listing_db" >> .env
        echo "AUCTION_DB=auction_db" >> .env
        echo "TRANSACTION_DB=transaction_db" >> .env
        echo "REPORT_DB=report_db" >> .env
        echo "REVIEW_DB=review_db" >> .env
        echo "PRICING_DB=pricing_db" >> .env
        echo "JWT_SECRET_KEY=test_secret" >> .env

    # Bước 2: Dùng 'docker compose' (Chuẩn V2 của GitHub)
    - name: Start Services
      run: docker compose up -d --build

    # Bước 3: Đợi Nginx Gateway sẵn sàng (Tăng lên 120s vì hệ thống Microservices nặng)
    - name: Wait for API Ready
      run: |
        echo "Waiting for EV Platform to wake up..."
        timeout 120s bash -c 'until curl -s http://localhost/user/api/login > /dev/null; do sleep 5; echo "Still waiting for Nginx Gateway..."; done'

    # Bước 4: Chạy Newman (Postman)
    - name: Run Newman Tests
      run: |
        npm install -g newman
        newman run "automation-tests/postman/EV_Platform_Automation.postman_collection.json" \
                   -e "automation-tests/postman/EV_Testing.postman_environment.json" \
                   --env-var "url_base=http://localhost/"